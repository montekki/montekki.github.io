# On every push this script is executed
on: push
name: Build and deploy GH Pages
jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: checkout
        uses: actions/checkout@v7
      - name: install_tikz_deps
        run: sudo apt-get update && sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-pictures dvisvgm mupdf-tools
      - name: render_tikz
        run: bash ci/render-tikz.sh
      - name: build_and_deploy
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          # Target branch
          PAGES_BRANCH: gh-pages
          # Provide personal access token
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install aspell
        run: sudo apt-get install aspell

      - name: Spellcheck
        run: bash ci/spellcheck.sh list
